<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Playfair+Display:ital,wght@0,500;1,500&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="css/style.css" />
        <script src="js/main.js" defer></script>
        <script src="js/liquidGlass.js" defer></script>
        <title>eNVision</title>
    </head>
    <body>
        <div class="bg-image">
            <img
                src="assets/images/iccup-xNtwmcRP-gw-unsplash.jpg"
                alt=""
                aria-hidden="true"
            />
        </div>
        <header class="site-header">
            <div class="brand-logo-container">
                <span class="brand-logo">eNVision</span>
            </div>
            <nav class="nav-container liquid-glass">
                <div class="nav-content">
                    <ul class="nav-links">
                        <li>
                            <a
                                class="nav-item"
                                href="index.html"
                                aria-current="page"
                            >
                                <img
                                    src="assets/icons/house.svg"
                                    alt="home logo"
                                    width="20"
                                    height="20"
                                />
                                <span class="nav-label">Home</span>
                            </a>
                        </li>
                        <li>
                            <a class="nav-item" href="pages/products.html">
                                <img
                                    src="assets/icons/glasses.svg"
                                    alt="product logo"
                                    width="20"
                                    height="20"
                                />
                                <span class="nav-label">Products</span>
                            </a>
                        </li>
                        <li>
                            <a class="nav-item" href="pages/rewards.html">
                                <img
                                    src="assets/icons/gift.svg"
                                    alt="reward logo"
                                    width="20"
                                    height="20"
                                />
                                <span class="nav-label">Rewards</span>
                            </a>
                        </li>
                        <li>
                            <a class="nav-item" href="pages/about-us.html">
                                <img
                                    src="assets/icons/users-round.svg"
                                    alt="about logo"
                                    width="20"
                                    height="20"
                                />
                                <span class="nav-label">About Us</span>
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>
            <div class="cta-container">
                <a class="cta" href="pages/order.html">
                    <img
                        src="assets/icons/shopping-cart.svg"
                        alt="home logo"
                        width="20"
                        height="20"
                    />
                    <span class="cta-label">Order Now</span>
                </a>
            </div>
        </header>
    </body>
</html>
